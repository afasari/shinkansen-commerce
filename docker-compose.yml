services:
  postgres:
    image: postgres:15-alpine
    container_name: shinkansen-postgres
    environment:
      POSTGRES_DB: shinkansen
      POSTGRES_USER: shinkansen
      POSTGRES_PASSWORD: shinkansen_dev_password
      POSTGRES_HOST: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shinkansen"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shinkansen-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: shinkansen-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger
      - prometheus
      - loki

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: shinkansen-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: shinkansen-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"
      - "14250:14250"

  loki:
    image: grafana/loki:2.9.4
    container_name: shinkansen-loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:10.3.3
    container_name: shinkansen-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: shinkansen-product-service
    environment:
      GRPC_SERVER_ADDRESS: :9091
      METRICS_SERVER_ADDRESS: :8091
      DATABASE_URL: postgres://shinkansen:shinkansen_dev_password@postgres:5432/shinkansen?sslmode=disable
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: product-service
    ports:
      - "9091:9091"
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: shinkansen-order-service
    environment:
      GRPC_SERVER_ADDRESS: :9092
      METRICS_SERVER_ADDRESS: :8092
      DATABASE_URL: postgres://shinkansen:shinkansen_dev_password@postgres:5432/shinkansen?sslmode=disable
      REDIS_URL: redis://redis:6379
      PRODUCT_SERVICE_GRPC_ADDRESS: product-service:9091
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: order-service
    ports:
      - "9092:9092"
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      product-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8092/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: shinkansen-user-service
    environment:
      GRPC_SERVER_ADDRESS: :9103
      METRICS_SERVER_ADDRESS: :8103
      DATABASE_URL: postgres://shinkansen:shinkansen_dev_password@postgres:5432/shinkansen?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-jwt-secret-change-in-production
      ACCESS_TOKEN_DURATION: 3600
      REFRESH_TOKEN_DURATION: 86400
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: user-service
    ports:
      - "9103:9103"
      - "8103:8103"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8103/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: shinkansen-payment-service
    environment:
      GRPC_SERVER_ADDRESS: :9104
      METRICS_SERVER_ADDRESS: :8104
      DATABASE_URL: postgres://shinkansen:shinkansen_dev_password@postgres:5432/shinkansen?sslmode=disable
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: payment-service
    ports:
      - "9104:9104"
      - "8104:8104"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8104/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: shinkansen-inventory-service
    environment:
      GRPC_SERVER_ADDRESS: :9105
      METRICS_SERVER_ADDRESS: :8105
      DATABASE_URL: postgres://shinkansen:shinkansen_dev_password@postgres:5432/shinkansen?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: inventory-service
    ports:
      - "9105:9105"
      - "8105:8105"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8105/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  delivery-service:
    build:
      context: .
      dockerfile: services/delivery-service/Dockerfile
    container_name: shinkansen-delivery-service
    environment:
      GRPC_SERVER_ADDRESS: :9106
      METRICS_SERVER_ADDRESS: :8106
      DATABASE_URL: postgres://shinkansen:shinkansen_dev_password@postgres:5432/shinkansen?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: delivery-service
    ports:
      - "9106:9106"
      - "8106:8106"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8106/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: shinkansen-gateway
    environment:
      HTTP_SERVER_ADDRESS: :8080
      PRODUCT_SERVICE_GRPC_ADDRESS: product-service:9091
      ORDER_SERVICE_GRPC_ADDRESS: order-service:9092
      USER_SERVICE_GRPC_ADDRESS: user-service:9103
      PAYMENT_SERVICE_GRPC_ADDRESS: payment-service:9104
      INVENTORY_SERVICE_GRPC_ADDRESS: inventory-service:9105
      DELIVERY_SERVICE_GRPC_ADDRESS: delivery-service:9106
      JWT_SECRET: your-jwt-secret-change-in-production
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: gateway
    ports:
      - "8080:8080"
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-worker:
    build:
      context: .
      dockerfile: services/analytics-worker/Dockerfile
    container_name: shinkansen-analytics-worker
    environment:
      DATABASE_URL: postgres://shinkansen:shinkansen_dev_password@postgres:5432/shinkansen?sslmode=disable
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: analytics-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  default:
    name: shinkansen-network
