# Shinkansen Commerce Helm Chart Values

global:
  # Common environment variables
  env:
    AWS_REGION: ap-northeast-1
    LOG_LEVEL: info

  # Image registry
  imageRegistry: ghcr.io/afasari/shinkansen-commerce

  # Service annotations
  serviceAnnotations: {}

# Gateway service configuration
gateway:
  enabled: true
  replicaCount: 3

  image:
    repository: gateway
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: LoadBalancer
    port: 8080
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

  ingress:
    enabled: true
    className: "alb"
    hosts:
      - host: api.shinkansen.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: shinkansen-tls

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  env:
    DATABASE_URL: "postgres://user:pass@gateway-service:5432/shinkansen"
    REDIS_URL: "redis://redis-service:6379"
    JWT_SECRET: "change-me-in-production"
    PRODUCT_SERVICE_URL: "product-service:9091"
    ORDER_SERVICE_URL: "order-service:9092"
    PAYMENT_SERVICE_URL: "payment-service:9104"
    USER_SERVICE_URL: "user-service:9103"
    DELIVERY_SERVICE_URL: "delivery-service:9106"

# Product service configuration
product:
  enabled: true
  replicaCount: 2

  image:
    repository: product-service
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9091
    metricsPort: 8091

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  env:
    DATABASE_URL: "postgres://user:pass@product-service:5432/shinkansen"
    REDIS_URL: "redis://redis-service:6379"

# Order service configuration
order:
  enabled: true
  replicaCount: 2

  image:
    repository: order-service
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9092
    metricsPort: 8092

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  env:
    DATABASE_URL: "postgres://user:pass@order-service:5432/shinkansen"
    REDIS_URL: "redis://redis-service:6379"
    KAFKA_BROKERS: "kafka-service:9092"
    PRODUCT_SERVICE_URL: "product-service:9091"

# Payment service configuration
payment:
  enabled: true
  replicaCount: 2

  image:
    repository: payment-service
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9104
    metricsPort: 8104

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  env:
    DATABASE_URL: "postgres://user:pass@payment-service:5432/shinkansen"
    REDIS_URL: "redis://redis-service:6379"
    STRIPE_API_KEY: "sk_test_xxxxx"
    STRIPE_WEBHOOK_SECRET: "whsec_xxxxx"

# User service configuration
user:
  enabled: true
  replicaCount: 2

  image:
    repository: user-service
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9103
    metricsPort: 8103

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  env:
    DATABASE_URL: "postgres://user:pass@user-service:5432/shinkansen"
    REDIS_URL: "redis://redis-service:6379"
    JWT_SECRET: "change-me-in-production"
    ACCESS_TOKEN_DURATION: "15"
    REFRESH_TOKEN_DURATION: "10080"

# Inventory service configuration (Rust)
inventory:
  enabled: true
  replicaCount: 2

  image:
    repository: inventory-service
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9105
    metricsPort: 8105

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1500m"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  env:
    DATABASE_URL: "postgres://user:pass@inventory-service:5432/shinkansen"

# Delivery service configuration
delivery:
  enabled: true
  replicaCount: 2

  image:
    repository: delivery-service
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9106
    metricsPort: 8106

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  env:
    DATABASE_URL: "postgres://user:pass@delivery-service:5432/shinkansen"
    REDIS_URL: "redis://redis-service:6379"

# Analytics worker configuration
analytics:
  enabled: true
  replicaCount: 1

  image:
    repository: analytics-worker
    tag: "latest"
    pullPolicy: IfNotPresent

  # Analytics is a Job/CronJob, not a Deployment
  cronJob: true
  schedule: "0 */6 * * *" # Every 6 hours

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1500m"

  env:
    DATABASE_URL: "postgres://user:pass@analytics:5432/shinkansen"
    REDIS_URL: "redis://redis-service:6379"
    KAFKA_BROKERS: "kafka-service:9092"

# Dependencies - PostgreSQL
postgresql:
  enabled: true
  primary:
    replicaCount: 1
  readReplicas:
    replicaCount: var.environment == "prod" ? 2 : 0

  auth:
    database: shinkansen
    username: shinkansen
    password: "change-me"

  primary:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

    persistence:
      enabled: true
      size: 100Gi

# Dependencies - Redis
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

  master:
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"

    persistence:
      enabled: true
      size: 10Gi

# Dependencies - Kafka
kafka:
  enabled: true
  replicaCount: var.environment == "prod" ? 3 : 1

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  persistence:
    enabled: true
    size: 20Gi

  topics:
    - name: orders
      partitions: 3
      replicationFactor: 3
    - name: product-views
      partitions: 3
      replicationFactor: 3
    - name: user-events
      partitions: 3
      replicationFactor: 3
    - name: payments
      partitions: 3
      replicationFactor: 3

# Monitoring - Prometheus
prometheus:
  enabled: true
  server:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

  retention: 15d
  storageSize: 50Gi

# Monitoring - Grafana
grafana:
  enabled: true
  replicas: 1

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"

  persistence:
    enabled: true
    size: 5Gi

  adminPassword: "admin"
  dashboardProviders:
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server

# Monitoring - Jaeger
jaeger:
  enabled: true

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  storage:
    type: memory
